<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Twenty Four | Architecture & Interiors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    <style>

        /* ── Intro / Brand Statement Section ── */
        .intro-section {
            background: #f0ede8;
            padding: 110px 7% 120px;
        }

        .intro-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 100px;
            align-items: center;
        }

        .intro-left p {
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 300;
            line-height: 1.95;
            color: #555;
            letter-spacing: 0.15px;
            margin: 0 0 1.4em 0;
        }

        .intro-left p:last-child {
            margin-bottom: 0;
        }

        .intro-right blockquote {
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.9rem, 3vw, 2.6rem);
            line-height: 1.4;
            color: #1a1a1a;
            letter-spacing: -0.2px;
        }

        @media (max-width: 860px) {
            .intro-section { padding: 70px 6% 80px; }
            .intro-inner { grid-template-columns: 1fr; gap: 44px; }
        }

        /* ── Nav Dropdown ── */
        .nav-dropdown {
            position: relative;
        }

        .nav-dropdown > a::after {
            content: ' ↓';
            font-size: 0.65rem;
            opacity: 0.5;
            vertical-align: middle;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 16px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border-radius: 4px;
            min-width: 160px;
            padding: 8px 0;
            z-index: 200;
        }

        .nav-dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            display: block;
            padding: 10px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: #444;
            text-decoration: none;
            transition: color 0.2s, background 0.2s;
            white-space: nowrap;
        }

        .dropdown-menu a:hover {
            color: #000;
            background: rgba(0,0,0,0.03);
        }

        /* ── Project Section Dividers ── */
        .project-section-label {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 48px 0 8px;
        }

        .project-section-label span {
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #aaa;
            white-space: nowrap;
        }

        .project-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e4df;
        }

        .project-section-label.first {
            padding-top: 0;
        }


<body>

        <div class="hero-text" style="position:absolute; bottom: 60px; left: 7%; top: auto; transform: none; text-align: left; display: flex; flex-direction: column; align-items: flex-start;">

    <!-- ── INTRO SECTION ── -->
    <section class="intro-section">
        <div class="intro-inner">
            <div class="intro-left">
                <p>Atelier Twenty Four is an architecture and interior design studio built on the belief that the most considered spaces are also the quietest ones — where nothing calls attention to itself, yet everything is felt.</p>
                <p>We work at an intimate scale, across homes, workplaces, hospitality and retail — from the first sketch to the final finish. This end-to-end process is deliberate. It is how intention survives execution.</p>
                <p>Every space we take on carries its own set of demands — what it must hold, what it must let go. Our work is the careful negotiation between the two.</p>
                <p>We take on few projects at a time. Deliberately so.</p>
            </div>
            <div class="intro-right">
                <blockquote>Every room holds a version of the life meant to be lived inside it. Our work is simply the act of finding it.</blockquote>
            </div>
        </div>
    </section>
